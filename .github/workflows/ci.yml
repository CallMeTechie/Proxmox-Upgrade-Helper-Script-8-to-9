name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Shellcheck + Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: bash -n (Syntax-Check)
        run: bash -n pve8to9_upgrade.sh

      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning

  smoke:
    name: Help & Argument-Parser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: --help liefert exit 0 und enthaelt Usage
        run: |
          out=$(bash pve8to9_upgrade.sh --help)
          rc=$?
          test "$rc" -eq 0 || { echo "expected rc=0, got $rc"; exit 1; }
          echo "$out" | grep -q '^Usage:' || { echo "Usage-Zeile fehlt"; exit 1; }

      - name: unbekannte Option liefert exit 2
        run: |
          set +e
          bash pve8to9_upgrade.sh --no-such-flag >/dev/null 2>&1
          rc=$?
          test "$rc" -eq 2 || { echo "expected rc=2, got $rc"; exit 1; }

  bats:
    name: bats tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run bats
        run: bats tests/
